<svg width="400" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main logo container -->
  <g transform="translate(10, 10)" filter="url(#shadow)">
    <!-- Circle badge (left) -->
    <circle cx="60" cy="60" r="50" fill="#29ABE2"/>
    
    <!-- Book icon in circle -->
    <g transform="translate(60, 60)">
      <!-- Book pages -->
      <rect x="-25" y="-20" width="22" height="35" fill="none" stroke="white" stroke-width="3" rx="4" ry="4"/>
      <rect x="3" y="-20" width="22" height="35" fill="none" stroke="white" stroke-width="3" rx="4" ry="4"/>
      <!-- Book spine -->
      <rect x="-1" y="-18" width="2" height="31" fill="white" rx="1"/>
    </g>
    
    <!-- Text bar (right) -->
    <rect x="85" y="35" width="280" height="50" fill="#29ABE2" rx="25" ry="25"/>
    
    <!-- Main text -->
    <text x="225" y="60" fill="white" font-family="Montserrat, Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" dominant-baseline="middle" letter-spacing="1px">READPROJECTTOPICS</text>
  </g>
  
  <!-- Tagline -->
  <text x="200" y="105" fill="#D3D3D3" font-family="Georgia, Times New Roman, serif" font-size="12" font-style="italic" text-anchor="middle">where knowledge meets discovery</text>
</svg>