<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="500" height="150">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#28a745;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e7e34;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon Section -->
  <g transform="translate(20, 25)">
    <!-- Green circle background -->
    <circle cx="50" cy="50" r="45" fill="url(#greenGrad)"/>
    
    <!-- Open book icon -->
    <g transform="translate(25, 25)">
      <path d="M2 5 Q24 -2 48 5 L48 42 Q24 35 2 42 Z" fill="white" opacity="0.95"/>
      <path d="M2 12 5 Q24 48 5" fill="none" stroke="#28a745" stroke-width="1.5"/>
      <path d="M25 5 L25 42" fill="none" stroke="#28a745" stroke-width="1.2"/>
      <path d="M2 24 Q13 19 25 24 Q37 19 48 24" fill="none" stroke="#28a745" stroke-width="0.8" opacity="0.6"/>
      <path d="M2 33 Q13 28 25 33 Q37 28 48 33" fill="none" stroke="#28a745" stroke-width="0.8" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Text Section -->
  <g transform="translate(130, 0)">
    <!-- NOUN text -->
    <text x="0" y="55" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="800" fill="#2d2d2d">NOUN</text>
    
    <!-- Reader text -->
    <text x="0" y="100" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="url(#greenGrad)">Reader</text>
  </g>
  
  <!-- Tagline -->
  <text x="135" y="125" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" letter-spacing="1">YOUR NOUN STUDY COMPANION</text>
</svg>